<style>
  /* ✅ ใช้เฉพาะหน้านี้ (Reports Section) */
  .reports-app {
      background-color: #f8f9fa;
      padding-top: 2rem;
  }

  .reports-app .card {
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
  }

  .reports-app .card:hover {
      transform: translateY(-5px);
  }

  .reports-app .card-header h5 {
      color: #495057;
  }

  .reports-app .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.7);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
          text-align: center;   /* ✅ จัดข้อความให้อยู่กึ่งกลาง */
  }
</style>



                    <!-- Reports Section -->
<div id="reportsSection" class="reports-app" style="display: none;">
                       <div class="row mb-4">
            <div class="col-12">
                <h2><i class="fas fa-file-alt me-2"></i>รายงาน</h2>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center d-flex flex-column">
                        <i class="fas fa-file-excel fa-3x text-success mb-3"></i>
                        <h5>รายงานสต็อกอุปกรณ์</h5>
                        <p class="text-muted">ส่งออกข้อมูลอุปกรณ์ทั้งหมดเป็นไฟล์ Excel</p>
                        <button class="btn btn-success mt-auto" onclick="generateQuickReport('stock', 'excel')">
                            <i class="fas fa-download me-2"></i>ดาวน์โหลด Excel
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center d-flex flex-column">
                        <i class="fas fa-file-pdf fa-3x text-danger mb-3"></i>
                        <h5>รายงานการเบิก-คืน</h5>
                        <p class="text-muted">ส่งออกประวัติการเบิก-คืนทั้งหมดเป็นไฟล์ PDF</p>
                         <button class="btn btn-danger mt-auto" onclick="generateQuickReport('transaction', 'pdf')">
                            <i class="fas fa-download me-2"></i>ดาวน์โหลด PDF
                        </button>
                    </div>
                </div>
            </div>
            
             <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center d-flex flex-column">
                        <i class="fas fa-chart-line fa-3x text-primary mb-3"></i>
                        <h5>รายงานสถิติ</h5>
                        <p class="text-muted">ส่งออกสถิติการใช้งานและมูลค่าอุปกรณ์</p>
                        <button class="btn btn-primary mt-auto" onclick="alert('ฟังก์ชันนี้ยังไม่เปิดใช้งาน')">
                            <i class="fas fa-download me-2"></i>ดาวน์โหลด PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-5">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0 text-white"><i class="fas fa-cogs me-2"></i>สร้างรายงานแบบกำหนดเอง</h5>
            </div>
            <div class="card-body p-4">
                <form id="customReportForm">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label for="reportType" class="form-label">ประเภทรายงาน</label>
                            <select class="form-select" id="reportType">
                                <option value="stock" selected>รายงานสต็อก</option>
                                <option value="transaction">รายงานการเบิก-คืน</option>
                                </select>
                        </div>
                        <div class="col-md-3">
                            <label for="reportStartDate" class="form-label">วันที่เริ่มต้น</label>
                            <input type="date" class="form-control" id="reportStartDate">
                        </div>
                        <div class="col-md-3">
                            <label for="reportEndDate" class="form-label">วันที่สิ้นสุด</label>
                            <input type="date" class="form-control" id="reportEndDate">
                        </div>
                        <div class="col-md-3">
                            <label for="reportFormat" class="form-label">รูปแบบไฟล์</label>
                            <select class="form-select" id="reportFormat">
                                <option value="excel">Excel (.xlsx)</option>
                                <option value="pdf">PDF (.pdf)</option>
                                <!-- <option value="csv">CSV (.csv)</option> -->
                            </select>
                        </div>
                    </div>
                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-file-export me-2"></i>สร้างรายงาน
                        </button>
                    </div>
                </form>
            </div>
        </div>



    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 fs-5">กำลังสร้างรายงาน...</p>
    </div>


</div>



  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->
    <script>
        const customReportForm = document.getElementById('customReportForm');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // จัดการการ submit ฟอร์มสร้างรายงานแบบกำหนดเอง
        customReportForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const reportType = document.getElementById('reportType').value;
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            const reportFormat = document.getElementById('reportFormat').value;

            if (startDate && endDate && (new Date(startDate) > new Date(endDate))) {
              alert('วันที่เริ่มต้นต้องมาก่อนวันที่สิ้นสุด');
              return;
            }

            const options = {
                reportType: reportType,
                startDate: startDate,
                endDate: endDate,
                reportFormat: reportFormat
            };

            showLoading();
            google.script.run
                .withSuccessHandler(downloadFile)
                .withFailureHandler(showError)
                .createCustomReport(options);
        });

        /**
         * ฟังก์ชันสำหรับปุ่ม Quick Reports
         */
        function generateQuickReport(type, format) {
             const options = {
                reportType: type,
                startDate: null, // ไม่กำหนดวันที่ เพื่อเอาข้อมูลทั้งหมด
                endDate: null,
                reportFormat: format
            };
            showLoading();
            google.script.run
                .withSuccessHandler(downloadFile)
                .withFailureHandler(showError)
                .createCustomReport(options);
        }
        
        /**
         * ฟังก์ชันนี้จะทำงานเมื่อได้รับข้อมูลไฟล์จาก Server สำเร็จ
         * @param {object} fileInfo - อ็อบเจ็กต์ที่ได้รับจาก Code.gs
         */
        function downloadFile(fileInfo) {
            hideLoading();
            const { base64Data, fileName, mimeType } = fileInfo;
            const link = document.createElement("a");
            link.href = `data:${mimeType};base64,${base64Data}`;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        /**
         * แสดงข้อผิดพลาดหากการทำงานฝั่ง Server ล้มเหลว
         */
        function showError(error) {
            hideLoading();
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาดในการสร้างรายงาน: ' + error.message);
        }

        function showLoading() {
            loadingOverlay.style.display = 'flex';
        }

        function hideLoading() {
            loadingOverlay.style.display = 'none';
        }

    </script>
