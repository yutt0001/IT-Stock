// ✅ ฟังก์ชันใหม่: ตั้งค่า Autocomplete สำหรับ "ช่องเบิก"
function setupBorrowAutocomplete(inventoryData) {
  if (!inventoryData || !Array.isArray(inventoryData)) return;
  
  // เก็บข้อมูลทั้งหมดไว้ในตัวแปรกลาง
  fullInventoryData = inventoryData; 
  
  const dataList = inventoryData.map(item => ({
    label: `${item.ItemID} - ${item.name || ''}`,
    value: item.ItemID
  }));

  const input = document.getElementById("borrowItemSearch");
  const awesomplete = new Awesomplete(input, { list: dataList, minChars: 1, maxItems: 10 });
  input.addEventListener('awesomplete-selectcomplete', e => displayItemDetails('borrow', e.text.value));
}

// ✅ ฟังก์ชันใหม่: ตั้งค่า Autocomplete สำหรับ "ช่องคืน"
function setupReturnAutocomplete(borrowedItems) {
  if (!borrowedItems || !Array.isArray(borrowedItems)) return;

  const dataList = borrowedItems.map(item => ({
    label: `${item.ItemID} - ${item.name || ''}`,
    value: item.ItemID
  }));
  
  const input = document.getElementById("returnItemSearch");
  const awesomplete = new Awesomplete(input, { list: dataList, minChars: 1, maxItems: 10 });
  input.addEventListener('awesomplete-selectcomplete', e => displayItemDetails('return', e.text.value));
}

// ✅ แก้ไข: ฟังก์ชันแสดงรายละเอียดจะดึงข้อมูลจาก fullInventoryData เสมอ
// เมื่อเลือกอุปกรณ์คืน (เรียกจาก awesomplete-selectcomplete)
function displayItemDetails(formType, itemID) {
  const hiddenInput = document.getElementById(`${formType}ItemID`);
  const detailsContainer = document.getElementById(`${formType}ItemDetails`);

  const selectedItem = fullInventoryData.find(item => String(item.ItemID) === String(itemID));

  if (selectedItem) {
    hiddenInput.value = selectedItem.ItemID;
    detailsContainer.innerHTML = `
      <strong>จำนวนคงเหลือ:</strong> ${selectedItem.quantity || '0'} ${selectedItem.unit || ''}<br>
      <strong>ประเภท:</strong> ${selectedItem.type || 'N/A'}<br>
      <strong>ตำแหน่งเก็บ:</strong> ${selectedItem.locationDetail || 'N/A'}
    `;
    detailsContainer.style.display = "block";

    if (formType === "return") {
      // โหลดรายชื่อผู้คืน (ผู้ที่ยังมียืมค้าง) จาก Transaction_Log
      google.script.run.withSuccessHandler(setupReturnerList).getReturners(selectedItem.ItemID);
    }
  } else {
    detailsContainer.innerHTML = 'ไม่พบรายละเอียดเพิ่มเติม';
    detailsContainer.style.display = "block";
  }
}


// ✅ ตั้งค่า autocomplete ผู้คืน
// ตั้งค่า dropdown ผู้คืน (แทน Awesomplete ที่เคยใช้กับช่องนี้)
function setupReturnerList(returners) {
  const select = document.getElementById("returner");
  const detailContainer = document.getElementById("borrowDetail");

  // reset
  select.innerHTML = `<option value="">-- เลือกผู้คืน --</option>`;
  detailContainer.style.display = "none";
  detailContainer.innerHTML = "";

  if (!returners || returners.length === 0) {
    // ไม่มีผู้ยืมค้าง
    const opt = document.createElement('option');
    opt.value = "";
    opt.disabled = true;
    opt.textContent = "ไม่มีผู้ยืมค้างสำหรับอุปกรณ์นี้";
    select.appendChild(opt);
    return;
  }

  // เพิ่ม options แบบปลอดภัย
  returners.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    select.appendChild(opt);
  });
}

  console.log("3. กำลังจะเรียก getBorrowDetail จาก Server...");
  // -------------

  google.script.run.withSuccessHandler(function(resp) {
    // --- DEBUG ---
    console.log("4. ได้รับการตอบกลับจาก Server!");
    console.log("   > ข้อมูลที่ได้รับ (resp):", resp);
    // -------------

    if (!resp) {
      // --- DEBUG ---
      console.error("5. resp เป็น null หรือค่าว่างเปล่า! จึงแสดงข้อความ 'ไม่พบข้อมูล'");
      // -------------
      container.innerHTML = "<p style='color:red;'>❌ ไม่พบข้อมูลการยืม</p>";
      container.style.display = "block";
      return;
    }

    // --- DEBUG ---
    console.log("6. resp มีข้อมูล จะทำการแสดงผล...");
    // -------------

    // resp = { totalBorrow, totalReturn, outstanding, details: [ {transactionID, timestamp, quantityChange}, ... ] }
    let html = `<h6>📋 รายละเอียดการยืมของ ${user}</h6>`;
    html += `<p>รวมที่ยืม: <strong>${resp.totalBorrow}</strong> | คืนแล้ว: <strong>${resp.totalReturn}</strong> | คงค้าง: <strong>${resp.outstanding}</strong></p>`;

    if (resp.details && resp.details.length) {
      html += "<ul>";
      resp.details.forEach(d => {
        html += `<li>เลขที่: ${d.transactionID || '-'} | วันที่: ${d.timestamp || '-'} | จำนวน: ${d.quantityChange}</li>`;
      });
      html += "</ul>";
    }

    container.innerHTML = html;
    container.style.display = "block";
  }).getBorrowDetail(itemID, user);
}

// ส่วนฟังก์ชันที่เหลือใช้โค้ดเดิมได้ครับ
// (นำมาวางต่อท้ายที่นี่)

// ✅ ฟังก์ชันส่งข้อมูล
function submitTransaction(type) {
  const statusUser = sessionStorage.getItem("statusUser")?.split(",") || [];
  const fullname = statusUser[3] || "";

  let data = {};
  if (type === "เบิก") {
    data.itemID = document.getElementById("borrowItemID").value;
    data.requester = document.getElementById("borrower").value;
    data.quantity = document.getElementById("borrowQty").value;
    data.notes = document.getElementById("borrowNotes").value;
  } else {
    data.itemID = document.getElementById("returnItemID").value;
    data.requester = document.getElementById("returner").value;
    data.quantity = document.getElementById("returnQty").value;
    data.condition = document.getElementById("returnCondition").value;
    data.notes = document.getElementById("returnNotes").value;
  }
  data.type = type;
  data.fullname = fullname; // ✅ ส่งไปที่ recordTransaction

  google.script.run.withSuccessHandler(res => {
    alert("บันทึกสำเร็จ! คงเหลือ: " + res.newQty);
    location.reload();
  }).withFailureHandler(err => {
    alert("❌ " + err.message);
  }).recordTransaction(data);
}

// ✅ ฟังก์ชันแสดงประวัติการทำรายการ (ปรับปรุงเล็กน้อย)
function renderLog(logs) {
  const tbody = document.querySelector("#logTable tbody");
  tbody.innerHTML = "";

  if (logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">ยังไม่มีประวัติการทำรายการ</td></tr>';
      return;
  }

  logs.forEach(log => {
    let tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${log.timestamp}</td>
      <td>${log.itemID}</td>
      <td>${log.itemName}</td>
      <td>${log.transactionType}</td>
      <td style="text-align:center;">${log.quantityChange}</td>
      <td>${log.requester}</td>
      <td>${log.notes || ''}</td>
    `;
    tbody.appendChild(tr);
  });
}
</script>
