<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ดระบบพัสดุ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Scoped styles for the dashboard page to prevent affecting other pages */
        #dashboardSection {
            font-family: 'Kanit', sans-serif;
            background-color: #f0f2f5;
        }
        #dashboardSection .container-fluid {
            padding: 2rem;
        }
        #dashboardSection .stats-card {
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        #dashboardSection .stats-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        #dashboardSection .stats-number {
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1.2;
        }
        #dashboardSection .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            height: 100%;
        }
        #dashboardSection .card-header {
            background-color: #fff;
            border-bottom: 1px solid #eee;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        #dashboardSection .card-header h5 {
            font-weight: 500;
            color: #333;
        }
        #dashboardSection .chart-container {
            position: relative;
            height: 300px; /* Adjust height as needed */
            width: 100%;
        }
        #dashboardSection #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #dashboardSection .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>

<div id="dashboardSection">
    <!-- Loading Spinner -->
    <div id="loader">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="container-fluid" id="mainContent" style="visibility: hidden;">
        <!-- Dashboard Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h2><i class="fas fa-tachometer-alt me-2"></i>แดชบอร์ดภาพรวม</h2>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-lg-3 col-md-6">
                <div class="stats-card">
                    <div class="stats-number" id="dashboardTotalCount">...</div>
                    <div>อุปกรณ์ทั้งหมด (ชิ้น)</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stats-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                    <div class="stats-number" id="availableEquipment">...</div>
                    <div>คงเหลือในสต็อก</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stats-card" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);">
                    <div class="stats-number" id="borrowedEquipment">...</div>
                    <div>ถูกเบิกไป</div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stats-card" style="background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);">
                    <div class="stats-number" id="totalValue">...</div>
                    <div>มูลค่ารวม (บาท)</div>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row">
            <div class="col-xl-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0 text-white"><i class="fas fa-chart-line me-2"></i>การเบิก-คืนรายเดือน (ปีปัจจุบัน)</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="dashboardMonthlyBorrowChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0 text-white"><i class="fas fa-chart-pie me-2"></i>สถานะอุปกรณ์</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="dashboardStatusChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-lg-0">
            <div class="col-xl-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0 text-white"><i class="fas fa-trophy me-2"></i>5 อันดับอุปกรณ์ที่ถูกเบิกบ่อยสุด</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="dashboardPopularEquipmentChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0 text-white"><i class="fas fa-chart-bar me-2"></i>มูลค่าพัสดุตามประเภท</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="dashboardValueByTypeChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader');
            const mainContent = document.getElementById('mainContent');
            let chartInstances = {}; // Use a local object to store chart instances

            // --- Function to fetch data from Google Apps Script ---
            function dashboardFetchData() {
                return new Promise((resolve, reject) => {
                    const inventoryPromise = new Promise((res, rej) => {
                        google.script.run
                            .withSuccessHandler(res)
                            .withFailureHandler(rej)
                            .getInventory();
                    });

                    const transactionPromise = new Promise((res, rej) => {
                        google.script.run
                            .withSuccessHandler(res)
                            .withFailureHandler(rej)
                            .getTransactionLog();
                    });

                    Promise.all([inventoryPromise, transactionPromise])
                        .then(([inventoryData, transactionData]) => {
                            resolve({ inventory: inventoryData, transactions: transactionData });
                        })
                        .catch(error => {
                            reject(error);
                        });
                });
            }

            // --- Main function to update the dashboard ---
            function dashboardUpdate(data) {
                const { inventory, transactions } = data;

                dashboardUpdateStatsCards(inventory, transactions);
                dashboardRenderMonthlyChart(transactions);
                dashboardRenderStatusChart(inventory);
                dashboardRenderPopularChart(transactions);
                dashboardRenderValueChart(inventory);

                loader.style.display = 'none';
                mainContent.style.visibility = 'visible';
            }
            
            // --- Helper function to format large numbers ---
            function dashboardFormatNumber(num) {
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1) + 'M';
                }
                if (num >= 1000) {
                    return (num / 1000).toFixed(1) + 'K';
                }
                return num.toLocaleString('th-TH');
            }
            
            function parseThaiDate(dateString) {
                if (!dateString || typeof dateString !== 'string') return null;
                if (dateString.includes('T') && dateString.includes('Z')) {
                    const d = new Date(dateString);
                    return isNaN(d) ? null : d;
                }
                const regex = /(\d{1,2})[\/\.](\d{1,2})[\/\.](\d{4}),?\s*(\d{1,2}):(\d{2}):(\d{2})/;
                const match = dateString.match(regex);
                if (match) {
                    let day = parseInt(match[1], 10);
                    let month = parseInt(match[2], 10) - 1;
                    let year = parseInt(match[3], 10);
                    if (year > 2500) year -= 543;
                    const d = new Date(year, month, day, parseInt(match[4], 10), parseInt(match[5], 10), parseInt(match[6], 10));
                    return isNaN(d) ? null : d;
                }
                const d = new Date(dateString);
                return isNaN(d) ? null : d;
            }

            // 1. Update Stats Cards
            function dashboardUpdateStatsCards(inventory, transactions) {
              const stockRemaining = inventory.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
                
                const netBorrowed = transactions.reduce((acc, tx) => {
                    const quantity = Number(tx.quantityChange) || 0;
                    if (tx.transactionType === 'เบิก') return acc + quantity;
                    if (tx.transactionType === 'คืน') return acc - quantity;
                    return acc;
                }, 0);
                const totalQuantity = stockRemaining + netBorrowed;
                const totalValue = inventory.reduce((sum, item) => sum + (Number(item.totalValue) || 0), 0);
                document.getElementById('dashboardTotalCount').textContent = dashboardFormatNumber(totalQuantity);
                document.getElementById('availableEquipment').textContent = dashboardFormatNumber(totalQuantity - netBorrowed);
                document.getElementById('borrowedEquipment').textContent = dashboardFormatNumber(netBorrowed);
                document.getElementById('totalValue').textContent = dashboardFormatNumber(totalValue);
            }

            // 2. Render Monthly Borrow Chart
            function dashboardRenderMonthlyChart(transactions) {
                if (chartInstances.monthly) chartInstances.monthly.destroy();
                const ctx = document.getElementById('dashboardMonthlyBorrowChart').getContext('2d');
                const monthlyData = { 'เบิก': Array(12).fill(0), 'คืน': Array(12).fill(0) };
                const currentYear = new Date().getFullYear();
                transactions.forEach(tx => {
                    const txDate = parseThaiDate(tx.timestamp);
                    if (txDate && txDate.getFullYear() === currentYear) {
                       const month = txDate.getMonth();
                       const quantity = Number(tx.quantityChange) || 0;
                       if (monthlyData[tx.transactionType]) {
                           monthlyData[tx.transactionType][month] += quantity;
                       }
                    }
                });
                chartInstances.monthly = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'],
                        datasets: [{
                            label: 'เบิก', data: monthlyData['เบิก'], borderColor: '#ff9a9e', backgroundColor: '#ff9a9e', fill: false, tension: 0.3
                        }, {
                            label: 'คืน', data: monthlyData['คืน'], borderColor: '#11998e', backgroundColor: '#11998e', fill: false, tension: 0.3
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }

            // 3. Render Equipment Status Chart
            function dashboardRenderStatusChart(inventory) {
                if (chartInstances.status) chartInstances.status.destroy();
                const ctx = document.getElementById('dashboardStatusChart').getContext('2d');
                const statusCounts = inventory.reduce((acc, item) => {
                    const status = item.status || 'ไม่ระบุ';
                    acc[status] = (acc[status] || 0) + (Number(item.quantity) || 1);
                    return acc;
                }, {});
                chartInstances.status = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(statusCounts),
                        datasets: [{
                            data: Object.values(statusCounts),
                            backgroundColor: ['#38ef7d', '#ff9a9e', '#ffecd2', '#667eea', '#fcb69f', '#f39c12'],
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }

            // 4. Render Popular Equipment Chart
            function dashboardRenderPopularChart(transactions) {
                if (chartInstances.popular) chartInstances.popular.destroy();
                const ctx = document.getElementById('dashboardPopularEquipmentChart').getContext('2d');
                const borrowCounts = transactions
                    .filter(tx => tx.transactionType === 'เบิก')
                    .reduce((acc, tx) => {
                        const name = tx.itemName || 'ไม่ระบุชื่อ';
                        acc[name] = (acc[name] || 0) + (Number(tx.quantityChange) || 0);
                        return acc;
                    }, {});
                const sortedItems = Object.entries(borrowCounts).sort(([, a], [, b]) => b - a).slice(0, 5);
                chartInstances.popular = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: sortedItems.map(item => item[0]),
                        datasets: [{ label: 'จำนวนที่ถูกเบิก', data: sortedItems.map(item => item[1]), backgroundColor: '#667eea' }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }

            // 5. Render Value By Type Chart
            function dashboardRenderValueChart(inventory) {
                if (chartInstances.value) chartInstances.value.destroy();
                const ctx = document.getElementById('dashboardValueByTypeChart').getContext('2d');
                const valueByType = inventory.reduce((acc, item) => {
                    const type = item.type || 'ไม่ระบุประเภท';
                    acc[type] = (acc[type] || 0) + (Number(item.totalValue) || 0);
                    return acc;
                }, {});
                chartInstances.value = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(valueByType),
                        datasets: [{
                            label: 'มูลค่ารวม (บาท)',
                            data: Object.values(valueByType),
                            backgroundColor: ['#ffecd2', '#fcb69f', '#ff9a9e', '#fecfef', '#11998e'],
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }

            // --- Initial call to fetch data and render the dashboard ---
            dashboardFetchData()
                .then(dashboardUpdate)
                .catch(err => {
                    console.error('Error loading dashboard data:', err);
                    loader.innerHTML = '<div class="text-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
                });
        });
    </script>
</body>
</html>
