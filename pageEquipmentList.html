    function showError(err) {

      document.getElementById("tableBody").innerHTML = `<tr><td colspan="9">ไม่สามารถโหลดข้อมูลได้</td></tr>`;
    }

    function loadData() {
      const filters = {
        keyword: document.getElementById("keyword").value.trim(),
        category: document.getElementById("category").value,
        status: document.getElementById("status").value,
        location: document.getElementById("location").value
      };

      document.getElementById("tableBody").innerHTML = `<tr><td colspan="9">กำลังโหลดข้อมูล...</td></tr>`;

      google.script.run
        .withSuccessHandler(displayData)
        .withFailureHandler(showError)
        .getInventoryData(filters);
    }

    function displayData(data) {
    allData = Array.isArray(data) ? data : [];

    // ==== Table View ====
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    // ==== Card View ====
    const cardView = document.getElementById("cardView");
    cardView.innerHTML = "";

    if (!allData.length) {
      tbody.innerHTML = `<tr><td colspan="9">ไม่พบข้อมูล</td></tr>`;
      cardView.innerHTML = `<p class="text-center">ไม่พบข้อมูล</p>`;
      return;
    }

    // ✅ set filter options
    setOptions("category", unique(allData.map(d => d.Category)));
    setOptions("status", unique(allData.map(d => d.Status)));
    setOptions("location", unique(allData.map(d => d.Location)));

    // ✅ Loop ข้อมูล
    allData.forEach(item => {
      const img = item.ImageURL ? item.ImageURL : "https://via.placeholder.com/60";

      // --- Table Row ---
      const row = `
        <tr>
          <td><img src="${img}" style="max-width:60px" onerror="this.src='https://via.placeholder.com/60'"></td>

          <td>${sanitize(item.SerialNumber)}</td>
          <td>${sanitize(item.Status)}</td>
          <td>${sanitize(item.Quantity)}</td>

                        </button>

        </tr>`;
      tbody.innerHTML += row;

      // --- Card Item ---
      const card = `
        <div class="card mb-2 shadow-sm">

              </div>
            </div>

  // ✅ กัน XSS
  function sanitize(str) {
    return str ? String(str).replace(/[&<>"']/g, m => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[m])) : "";
  }

  // ✅ ฟังก์ชัน set filter
  function unique(arr) {
    return [...new Set(arr.filter(Boolean))];
  }

  

    function unique(arr) { return [...new Set(arr.filter(v => v && String(v).trim() !== ""))]; }
    function setOptions(id, values) {
      const el = document.getElementById(id);
      const current = el.value;
      el.innerHTML = `<option>ทั้งหมด</option>`;
      values.forEach(v => el.innerHTML += `<option>${sanitize(v)}</option>`);
      if ([...el.options].some(o => o.value === current)) el.value = current;
    }
    function sanitize(v) { return v == null ? "" : String(v); }

    function resetFilters() {

      document.getElementById("status").value = "ทั้งหมด";

/**
 * ✏️ แสดงฟอร์มแก้ไขข้อมูลใน Modal
 */
function editEquipment(itemId) {
    const item = allData.find(d => d.ItemID == itemId);
    if (!item) {
        showError("ไม่พบข้อมูลอุปกรณ์ที่ระบุ");
        return;
    }

    // สร้างตัวเลือกสำหรับสถานะ (Status)
    const statusOptions = ['ใหม่', 'ใช้งานได้', 'ชำรุด', 'ส่งซ่อม', 'จำหน่าย'];
    const statusSelectHtml = statusOptions.map(opt =>
        `<option value="${sanitize(opt)}" ${item.Status === opt ? 'selected' : ''}>${sanitize(opt)}</option>`
    ).join('');

    // สร้างฟอร์มแก้ไขข้อมูลให้ครบถ้วนมากขึ้น
    const formHtml = `
    <input type="hidden" id="editItemId" value="${sanitize(item.ItemID)}">
    <div class="row g-3">
        <div class="col-md-8">
            <label for="editName" class="form-label">ชื่ออุปกรณ์</label>
            <input type="text" class="form-control" id="editName" value="${sanitize(item.Name)}" required>
        </div>
        <div class="col-md-4">
            <label for="editCategory" class="form-label">ประเภท</label>
            <input type="text" class="form-control" id="editCategory" value="${sanitize(item.Category)}">
        </div>
        <div class="col-md-6">
            <label for="editSerialNumber" class="form-label">Serial Number</label>
            <input type="text" class="form-control" id="editSerialNumber" value="${sanitize(item.SerialNumber)}">
        </div>
        <div class="col-md-6">
            <label for="editStatus" class="form-label">สถานะ</label>
            <select class="form-select" id="editStatus">${statusSelectHtml}</select>
        </div>
        <div class="col-md-3">
            <label for="editQuantity" class="form-label">จำนวน</label>
            <input type="number" class="form-control" id="editQuantity" value="${sanitize(item.Quantity)}">
        </div>
        <div class="col-md-9">
            <label for="editLocation" class="form-label">สถานที่เก็บ</label>
            <input type="text" class="form-control" id="editLocation" value="${sanitize(item.Location)}">
        </div>
        <div class="col-12">
            <label for="editCustodian" class="form-label">ผู้รับผิดชอบ</label>
            <input type="text" class="form-control" id="editCustodian" value="${sanitize(item.Custodian)}">
        </div>
        <div class="col-12">
            <label for="editNotes" class="form-label">รายละเอียดเพิ่มเติม/ตำแหน่ง</label>
            <textarea class="form-control" id="editNotes" rows="2">${sanitize(item.Notes)}</textarea>
        </div>
    </div>
    `;

    const form = document.getElementById('editEquipmentForm');
    // แทรกฟอร์ม HTML เข้าไปก่อนปุ่ม
    form.innerHTML = formHtml + form.lastElementChild.outerHTML;

    const editModal = new bootstrap.Modal(document.getElementById('editEquipmentModal'));
    editModal.show();
}

/**
 * 🗑️ ลบข้อมูลอุปกรณ์
 */
function deleteEquipment(itemId) {
  Swal.fire({
    title: 'ยืนยันการลบ?',
    text: `คุณต้องการลบอุปกรณ์รหัส ${sanitize(itemId)} ใช่หรือไม่?`,
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33',
    cancelButtonColor: '#6c757d',
    confirmButtonText: 'ใช่, ลบเลย!',
    cancelButtonText: 'ยกเลิก'
  }).then((result) => {
    if (result.isConfirmed) {
      // แสดงสถานะกำลังลบ...
      Swal.fire({
        title: 'กำลังลบข้อมูล...',
        text: 'กรุณารอสักครู่',
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });
      
      google.script.run
        .withSuccessHandler(response => {
          Swal.fire(
            'ลบสำเร็จ!',
            'อุปกรณ์ของคุณถูกลบเรียบร้อยแล้ว',
            'success'
          );
          loadData(); // โหลดข้อมูลใหม่เพื่ออัปเดตตาราง
        })
        .withFailureHandler(showError)
        .deleteItemById(itemId);
    }
  });
}

// === จัดการการ Submit ฟอร์มแก้ไข ===
document.getElementById('editEquipmentForm').addEventListener('submit', function(e) {
    e.preventDefault(); // ป้องกันการรีโหลดหน้าเว็บ

    // ดึงชื่อผู้ใช้งานจาก sessionStorage
    const statusUser = sessionStorage.getItem("statusUser")?.split(",") || [];
    const fullname = statusUser[3] || "N/A"; // ใส่ N/A หากไม่มีข้อมูล

    // สร้าง Object ข้อมูลที่จะส่งไปอัปเดตให้ครบถ้วน
    const updatedData = {
        ItemID: document.getElementById('editItemId').value,
        Name: document.getElementById('editName').value,
        Category: document.getElementById('editCategory').value,
        SerialNumber: document.getElementById('editSerialNumber').value,
        Status: document.getElementById('editStatus').value,
        Quantity: document.getElementById('editQuantity').value,
        Location: document.getElementById('editLocation').value,
        Custodian: document.getElementById('editCustodian').value,
        Notes: document.getElementById('editNotes').value,
        UpdatedBy: fullname // เพิ่มข้อมูลผู้แก้ไข
    };

    // แสดงสถานะกำลังบันทึก...
    Swal.fire({
        title: 'กำลังบันทึก...',
        allowOutsideClick: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    google.script.run
        .withSuccessHandler(response => {
            // ซ่อน Modal
            const editModal = bootstrap.Modal.getInstance(document.getElementById('editEquipmentModal'));
            editModal.hide();

            Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');

            loadData(); // โหลดข้อมูลใหม่เพื่ออัปเดตการแสดงผล
        })
        .withFailureHandler(showError)
        .updateEquipmentData(updatedData);
});
  </script>
